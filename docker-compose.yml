services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CONVEX_URL: ${NEXT_PUBLIC_CONVEX_URL}
        NEXT_PUBLIC_CONVEX_SITE_URL: ${NEXT_PUBLIC_CONVEX_SITE_URL}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    image: groupsapp-web:latest
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const r = await fetch('http://127.0.0.1:3000/api/health'); if (!r.ok) process.exit(1);",
        ]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
